<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubMap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jura:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --border: #2a3040;
    --accent: #00e5a0;
    --accent2: #4da6ff;
    --text: #e8ecf0;
    --muted: #94a0b0;
    --danger: #ff6b84;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Jura', sans-serif;
    font-size: 1rem;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  a { color: var(--accent2); }
  a:hover { color: var(--accent); }

  :focus-visible {
    outline: 2px solid var(--accent2);
    outline-offset: 2px;
  }

  /* Skip link */
  .skip-link {
    position: absolute;
    top: -40px;
    left: 0;
    background: var(--accent);
    color: #000;
    padding: 8px 16px;
    font-weight: 700;
    text-decoration: none;
    z-index: 100;
  }

  .skip-link:focus { top: 0; }

  header {
    width: 100%;
    max-width: 760px;
    margin-bottom: 36px;
  }

  h1 {
    font-size: 2.1rem;
    color: var(--accent);
  }

  h1 span { color: var(--text); }

  .subtitle {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Search */
  .search-form {
    width: 100%;
    max-width: 760px;
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  .search-form label {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .label-text {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  input[type="text"] {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Jura', sans-serif;
    font-size: 0.9rem;
    padding: 12px 16px;
  }

  input[type="text"]:focus-visible {
    outline: none;
    border-color: var(--accent2);
    box-shadow: 0 0 0 2px rgba(77, 166, 255, 0.4);
  }

  input[type="text"]::placeholder { color: var(--muted); }

  button {
    font-family: 'Jura', sans-serif;
    font-weight: inherit;
    cursor: pointer;
  }

  .scan-btn {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #000;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    padding: 12px 24px;
    text-transform: uppercase;
    align-self: flex-end;
    white-space: nowrap;
  }

  .scan-btn:hover { opacity: 0.85; }
  .scan-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Status */
  .status-bar {
    width: 100%;
    max-width: 760px;
    font-size: 0.8rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    min-height: 24px;
  }

  .status-badge {
    display: inline-block;
    background: rgba(0, 229, 160, 0.1);
    border: 1px solid rgba(0, 229, 160, 0.25);
    color: var(--accent);
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 8px;
    border-radius: 3px;
    margin-right: 8px;
  }

  .status-badge.error {
    background: rgba(255, 107, 132, 0.1);
    border-color: rgba(255, 107, 132, 0.25);
    color: var(--danger);
  }

  /* Progress — native <progress> element */
  progress {
    width: 100%;
    max-width: 760px;
    height: 4px;
    margin-bottom: 20px;
    border: none;
    border-radius: 2px;
    background: var(--border);
    display: none;
  }

  progress::-webkit-progress-bar { background: var(--border); border-radius: 2px; }
  progress::-webkit-progress-value { background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 2px; }
  progress::-moz-progress-bar { background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 2px; }

  /* Filter controls */
  fieldset.filter-row {
    width: 100%;
    max-width: 760px;
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: end;
    border: none;
    padding: 0;
  }

  .visually-hidden,
  fieldset.filter-row > legend {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .filter-row label {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .filter-row label:first-of-type {
    flex: 1;
    min-width: 160px;
  }

  .filter-row input[type="text"] {
    font-size: 0.8rem;
    padding: 8px 12px;
    border-radius: 4px;
  }

  .filter-row select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Jura', sans-serif;
    font-size: 0.8rem;
    padding: 8px 12px;
    cursor: pointer;
  }

  .filter-row select:focus-visible {
    outline: none;
    border-color: var(--accent2);
    box-shadow: 0 0 0 2px rgba(77, 166, 255, 0.4);
  }

  .btn-sm {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-size: 0.75rem;
    padding: 8px 12px;
    align-self: flex-end;
  }

  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  /* Results — uses native <details>/<summary> */
  main {
    width: 100%;
    max-width: 760px;
  }

  details {
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
    animation: fadeIn 0.2s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  @media (prefers-reduced-motion: reduce) {
    details { animation: none; opacity: 1; }
  }

  summary {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface);
    cursor: pointer;
    list-style: none;
    font-size: 0.85rem;
  }

  summary::-webkit-details-marker { display: none; }
  summary::marker { display: none; content: ""; }
  summary:hover { background: #1a1e24; }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .dot.apex { background: var(--accent2); }

  .domain-name {
    flex: 1;
    word-break: break-all;
  }

  .domain-name a {
    color: inherit;
    text-decoration: underline;
    text-decoration-color: var(--border);
    text-underline-offset: 2px;
  }

  .domain-name a:hover { color: var(--accent); text-decoration-color: var(--accent); }

  .issuer-tag {
    background: #0d1a12;
    border: 1px solid #1a3326;
    border-radius: 3px;
    color: #6fd89a;
    font-size: 0.75rem;
    padding: 2px 7px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .cert-detail {
    background: #0d0f12;
    border-top: 1px solid var(--border);
    font-size: 0.8rem;
    padding: 10px 14px 10px 33px;
    line-height: 1.8;
  }

  .cert-detail dl {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 2px 12px;
  }

  .cert-detail dt { color: var(--muted); font-weight: 700; }
  .cert-detail dd { color: #c0ccda; margin: 0; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 2;
  }

  .results-heading {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
  }

  .empty-state .icon { font-size: 2rem; margin-bottom: 12px; }

  .source-note {
    width: 100%;
    max-width: 760px;
    background: #0a1020;
    border: 1px solid #1a3360;
    border-radius: 4px;
    color: #8aaad0;
    font-size: 0.9rem;
    padding: 8px 14px;
    margin-bottom: 36px;
    line-height: 1.6;
  }

  .source-note strong { color: #a0c0e0; }

  .count-badge {
    background: #0d1a12;
    border: 1px solid #1a3326;
    border-radius: 10px;
    color: var(--accent);
    font-size: 0.75rem;
    padding: 2px 8px;
  }
</style>
</head>
<body>

<a href="#results" class="skip-link">Skip to results</a>

<header>
  <h1>Sub<span>Map</span></h1>
  <p class="subtitle">Subdomain Discovery via Certificate Transparency Logs</p>
</header>

<p class="source-note">
  <strong>Data source:</strong> crt.sh (Certificate Transparency logs). Results show all subdomains that have ever had a TLS certificate issued. No server access required.
</p>

<form class="search-form" id="searchForm" onsubmit="scan(); return false;">
  <label>
    <span class="label-text">Domain</span>
    <input type="text" id="domainInput" placeholder="example.com" autocomplete="off" spellcheck="false" required />
  </label>
  <button type="submit" class="scan-btn" id="scanBtn">Scan</button>
</form>

<label for="progressBar" class="visually-hidden">Scan progress</label>
<progress id="progressBar" max="100" value="0">0%</progress>

<div class="status-bar">
  <output id="statusText"></output>
  <output id="countBadge"></output>
</div>

<fieldset class="filter-row" id="filterRow" style="display:none">
  <legend>Filter and sort results</legend>
  <label>
    <span class="label-text">Filter</span>
    <input type="text" id="filterInput" placeholder="filter results..." oninput="applyFilter()" />
  </label>
  <label>
    <span class="label-text">Sort</span>
    <select id="sortSelect" onchange="applyFilter()">
      <option value="alpha">A-Z</option>
      <option value="zalpha">Z-A</option>
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
    </select>
  </label>
  <button type="button" class="btn-sm" onclick="copyAll()">Copy all</button>
  <button type="button" class="btn-sm" onclick="exportCSV()">Export CSV</button>
</fieldset>

<main id="results" aria-label="Scan results">
  <div class="empty-state"><div class="icon" aria-hidden="true">&#x2B21;</div>Enter a domain above and hit Scan</div>
</main>

<script>
  let allEntries = [];

  function setProgress(pct) {
    const bar = document.getElementById('progressBar');
    bar.value = pct;
    bar.textContent = pct + '%';
    bar.style.display = pct > 0 && pct < 100 ? 'block' : 'none';
  }

  async function scan() {
    const raw = document.getElementById('domainInput').value.trim().toLowerCase();
    if (!raw) return;

    const domain = raw.replace(/^https?:\/\//, '').replace(/\/.*$/, '');
    const btn = document.getElementById('scanBtn');
    const status = document.getElementById('statusText');
    const results = document.getElementById('results');
    const filterRow = document.getElementById('filterRow');

    btn.disabled = true;
    allEntries = [];
    results.innerHTML = '';
    filterRow.style.display = 'none';
    document.getElementById('countBadge').innerHTML = '';
    status.innerHTML = '<span class="status-badge">Scanning</span>' + domain;

    setProgress(15);

    try {
      const url = 'https://crt.sh/?q=%.' + domain + '&output=json';
      setProgress(40);

      const res = await fetch(url);
      setProgress(70);

      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      setProgress(90);

      const seen = new Map();
      for (const cert of data) {
        const names = cert.name_value.split('\n');
        for (const name of names) {
          const clean = name.trim().toLowerCase().replace(/^\*\./, '');
          if (!clean || !clean.endsWith(domain)) continue;
          if (!seen.has(clean)) {
            seen.set(clean, {
              domain: clean,
              issuer: cert.issuer_ca_id,
              issuerName: (cert.issuer_name || '').replace(/.*CN=/, '').split(',')[0].trim() || 'Unknown',
              notBefore: cert.not_before,
              notAfter: cert.not_after,
              serial: cert.serial_number,
              id: cert.id
            });
          }
        }
      }

      allEntries = [...seen.values()].sort((a, b) => a.domain.localeCompare(b.domain));
      setProgress(100);
      setTimeout(() => setProgress(0), 400);

      if (allEntries.length === 0) {
        status.innerHTML = '<span class="status-badge error">No results</span>' + domain;
        results.innerHTML = '<div class="empty-state"><div class="icon" aria-hidden="true">\u2205</div>No subdomains found in CT logs</div>';
      } else {
        filterRow.style.display = 'flex';
        status.innerHTML = '<span class="status-badge">Done</span>' + domain;
        renderEntries(allEntries);
        document.getElementById('countBadge').innerHTML = '<span class="count-badge">' + allEntries.length + ' subdomains</span>';
      }

    } catch (err) {
      setProgress(0);
      status.innerHTML = '<span class="status-badge error">Error</span>' + err.message;
      results.innerHTML = '<div class="empty-state"><div class="icon" aria-hidden="true">\u2715</div>Failed to fetch data. crt.sh may be rate-limiting or unreachable. Try again shortly.</div>';
    }

    btn.disabled = false;
  }

  function renderEntries(entries) {
    const results = document.getElementById('results');
    const inputDomain = document.getElementById('domainInput').value.trim().toLowerCase().replace(/^https?:\/\//, '').replace(/\/.*$/, '');
    results.innerHTML = '';

    const heading = document.createElement('h2');
    heading.className = 'results-heading';
    heading.textContent = entries.length + ' subdomains for ' + inputDomain;
    results.appendChild(heading);

    entries.forEach((entry, i) => {
      const el = document.createElement('details');
      el.style.animationDelay = Math.min(i * 18, 300) + 'ms';

      const isApex = entry.domain === inputDomain;

      el.innerHTML =
        '<summary>' +
          '<span class="dot' + (isApex ? ' apex' : '') + '" aria-hidden="true"></span>' +
          '<span class="domain-name">' + entry.domain + '</span>' +
          '<span class="issuer-tag">' + entry.issuerName.substring(0, 22) + '</span>' +
        '</summary>' +
        '<div class="cert-detail">' +
          '<dl>' +
            '<dt>Visit</dt><dd><a href="https://' + entry.domain + '" target="_blank" rel="noopener noreferrer">' + entry.domain + ' (opens in new tab)</a></dd>' +
            '<dt>Not before</dt><dd>' + (entry.notBefore || '\u2014') + '</dd>' +
            '<dt>Not after</dt><dd>' + (entry.notAfter || '\u2014') + '</dd>' +
            '<dt>Serial</dt><dd>' + (entry.serial || '\u2014') + '</dd>' +
            '<dt>crt.sh</dt><dd><a href="https://crt.sh/?id=' + entry.id + '" target="_blank" rel="noopener noreferrer">view cert #' + entry.id + ' (opens in new tab)</a></dd>' +
          '</dl>' +
        '</div>';

      results.appendChild(el);
    });
  }

  function applyFilter() {
    const q = document.getElementById('filterInput').value.toLowerCase();
    const sort = document.getElementById('sortSelect').value;
    let filtered = allEntries.filter(e => e.domain.includes(q));

    if (sort === 'zalpha') filtered.sort((a, b) => b.domain.localeCompare(a.domain));
    else if (sort === 'newest') filtered.sort((a, b) => new Date(b.notBefore) - new Date(a.notBefore));
    else if (sort === 'oldest') filtered.sort((a, b) => new Date(a.notBefore) - new Date(b.notBefore));
    else filtered.sort((a, b) => a.domain.localeCompare(b.domain));

    document.getElementById('countBadge').innerHTML = '<span class="count-badge">' + filtered.length + ' subdomains</span>';
    renderEntries(filtered);
  }

  function copyAll() {
    const text = allEntries.map(e => e.domain).join('\n');
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelectorAll('.btn-sm')[0];
      btn.textContent = 'Copied!';
      announce('Copied ' + allEntries.length + ' subdomains to clipboard');
      setTimeout(() => btn.textContent = 'Copy all', 1500);
    });
  }

  function announce(message) {
    var el = document.getElementById('live-announce');
    if (!el) {
      el = document.createElement('div');
      el.id = 'live-announce';
      el.setAttribute('role', 'status');
      el.setAttribute('aria-live', 'polite');
      el.style.cssText = 'position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0';
      document.body.appendChild(el);
    }
    el.textContent = '';
    setTimeout(() => { el.textContent = message; }, 100);
  }

  function exportCSV() {
    const rows = [['domain', 'issuer', 'not_before', 'not_after', 'serial', 'crt_id']];
    allEntries.forEach(e => rows.push([e.domain, e.issuerName, e.notBefore, e.notAfter, e.serial, e.id]));
    const csv = rows.map(r => r.map(v => '"' + v + '"').join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'subdomains.csv';
    a.click();
  }
</script>
</body>
</html>
